name: Bug Report 🐛
description: Something isn't working as expected.
labels: [bug]
body:
  - type: dropdown
    id: component
    attributes:
      label: Library Component
      description: >-
        Which internal parser(s)/generator(s) are likely involved? Select every component you
        suspect - many bugs span more than one (e.g. a shared AST/config helper affecting several
        formats at once), so don't force a single guess if you're not sure which one is at fault.
      multiple: true
      options:
        - Word Parser (DOCX)
        - PowerPoint Parser (PPTX)
        - Excel Parser (XLSX)
        - OpenOffice Parser (ODT, ODS, ODP)
        - PDF Parser
        - RTF Parser
        - CSV Parser
        - Markdown Parser
        - HTML Parser
        - EPUB Parser
        - HTML Generator
        - Markdown Generator
        - PDF Generator
        - RTF Generator
        - CSV Generator
        - Text Generator
        - EPUB Generator
        - Chunking / RAG Generator
        - Core / Shared (AST, types, config resolution - not specific to one format)
        - OCR Scheduler & Infrastructure
        - CLI / Tooling
        - Other / Not Sure
    validations:
      required: true

  - type: upload
    id: sample-file
    attributes:
      label: Sample File
      description: If you can share a file that causes the issue, please upload it here (max 25MB).
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description & Reproduction
      description: Please describe the issue, provide a code snippet, or share the error message.
      placeholder: |
        - What did you do?
        - What was the error?
        - (Optional) Minimal code snippet
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node.js version, or any other relevant details.
      placeholder: e.g. Node 20, macOS
